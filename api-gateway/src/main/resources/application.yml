server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/auth/**
          filters:
            # Corectat: Segmentul de cautare trebuie sa fie /auth/
            - RewritePath=/auth/(?<segment>.*), /${segment}
            - name: JwtAuthenticationFilter

        - id: music-service
          uri: ${MUSIC_SERVICE_URL}
          predicates:
            - Path=/music/**
          filters:
            # Corectat: Eliminat backslash-ul din fata semnului $
            - RewritePath=/music/(?<segment>.*), /${segment}
            - name: JwtAuthenticationFilter